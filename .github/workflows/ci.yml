name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Fail on tracked files over 10MB
        run: |
          oversized=$(git ls-files -z | xargs -0 -I{} sh -c 'size=$(wc -c <"{}" 2>/dev/null || echo 0); if [ "$size" -gt 10485760 ]; then echo "{} ($size bytes)"; fi')
          if [ -n "$oversized" ]; then
            echo "Tracked files over 10MB detected:"
            echo "$oversized"
            exit 1
          fi

  playbook-clean-environment:
    name: Playbook clean-environment validation
    runs-on: ubuntu-latest
    env:
      # Deterministic official fallback source used when package acquisition is blocked.
      # Pinned to an immutable official release artifact to keep clean-environment CI reproducible.
      PLAYBOOK_OFFICIAL_FALLBACK_SPEC: https://github.com/fawxzzy/playbook-cli/releases/download/v0.3.77/playbook-cli-0.3.77.tgz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies from a clean environment
        run: npm install

      - name: Acquire Playbook runtime explicitly
        run: |
          set -euo pipefail

          if [ -z "${PLAYBOOK_OFFICIAL_FALLBACK_SPEC:-}" ]; then
            echo "PLAYBOOK_OFFICIAL_FALLBACK_SPEC must be defined for deterministic CI runtime acquisition."
            exit 1
          fi

          package_acquired=0

          if [ "${PLAYBOOK_SKIP_PACKAGE_ACQUIRE:-0}" = "1" ]; then
            echo "PLAYBOOK_SKIP_PACKAGE_ACQUIRE=1; skipping package acquisition path by request."
          elif npm run playbook-runtime:install-package; then
            echo "Playbook acquired via package install path."
            package_acquired=1
          else
            echo "Package acquisition failed; executing official fallback acquisition path."
          fi

          if [ "$package_acquired" -eq 0 ]; then
            echo "Installing Playbook from official fallback distribution: ${PLAYBOOK_OFFICIAL_FALLBACK_SPEC}"
            npm run playbook-runtime:install-official-fallback
          fi

      - name: Validate canonical Playbook command ladder
        run: |
          # Canonical proof path: explicit acquisition + deterministic runtime resolution.
          unset PLAYBOOK_BIN

          npm run ai-context
          npm run ai-contract
          npm run context
          npm run index
          npm run verify
          npm run plan
          npm run pilot

      - name: Assert required runtime artifacts are written under .playbook/
        run: |
          required_artifacts=(
            ".playbook/findings.json"
            ".playbook/plan.json"
            ".playbook/repo-graph.json"
            ".playbook/last-run.json"
          )

          for artifact in "${required_artifacts[@]}"; do
            if [ ! -f "$artifact" ]; then
              echo "Expected required Playbook artifact '$artifact' to exist, but it was missing."
              exit 1
            fi
          done

          echo "All required Playbook artifacts are present under .playbook/."
