name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Contracts check
        run: npm run contracts:check


      - name: Playbook learning check
        run: npm run playbook:check

      - name: Playbook automation (run + promote + status gate)
        run: npm run playbook:auto


      - name: Print Playbook next command
        if: always()
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/playbook-status.json';
          if (!fs.existsSync(path)) {
            console.log('No docs/playbook-status.json found.');
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync(path, 'utf8'));
          const next = status.recommended_next_action || 'none';
          const reason = status.reason || 'No reason provided.';
          console.log(`Playbook next action: ${next}`);
          console.log(`Reason: ${reason}`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `\n## Playbook Next Action\n- Next: \`${next}\`\n- Reason: ${reason}\n`);
          NODE

      - name: Ensure Playbook status snapshot on failure
        if: failure()
        run: npm run playbook || true

      - name: Print Playbook next command (on failure)
        if: failure()
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/playbook-status.json';
          if (!fs.existsSync(path)) {
            console.log('No docs/playbook-status.json found.');
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync(path, 'utf8'));
          const next = status.recommended_next_action ?? status.next_command ?? status.nextCommand ?? null;
          const reason = status.reason ?? status.recommended_next_action_reason ?? status.next_reason ?? null;
          const counts = status.counts ?? status.knowledge_counts ?? status.knowledge ?? null;

          const lines = [];
          lines.push('## Playbook Next Command (from playbook-status.json)');
          if (next) lines.push(`**Next command:** \`${next}\``);
          if (reason) lines.push(`**Reason:** ${reason}`);
          if (counts) lines.push(`**Counts:** \`${JSON.stringify(counts)}\``);
          lines.push('');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          console.log(lines.join('\n'));
          NODE

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Fail on tracked files over 10MB
        run: |
          oversized=$(git ls-files -z | xargs -0 -I{} sh -c 'size=$(wc -c <"{}" 2>/dev/null || echo 0); if [ "$size" -gt 10485760 ]; then echo "{} ($size bytes)"; fi')
          if [ -n "$oversized" ]; then
            echo "Tracked files over 10MB detected:"
            echo "$oversized"
            exit 1
          fi
