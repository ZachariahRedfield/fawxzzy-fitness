name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Fail on tracked files over 10MB
        run: |
          oversized=$(git ls-files -z | xargs -0 -I{} sh -c 'size=$(wc -c <"{}" 2>/dev/null || echo 0); if [ "$size" -gt 10485760 ]; then echo "{} ($size bytes)"; fi')
          if [ -n "$oversized" ]; then
            echo "Tracked files over 10MB detected:"
            echo "$oversized"
            exit 1
          fi

  playbook-clean-environment:
    name: Playbook clean-environment validation
    runs-on: ubuntu-latest
    env:
      PLAYBOOK_OFFICIAL_FALLBACK_SPEC: https://github.com/ZachariahRedfield/playbook/releases/download/v0.1.8/playbook-cli-0.1.8.tgz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies from a clean environment
        run: npm ci

      - name: Acquire Playbook runtime from the canonical official distribution
        run: node scripts/playbook-runtime.mjs --install-official-fallback

      - name: Validate canonical Playbook command ladder
        run: |
          unset PLAYBOOK_BIN

          node scripts/playbook-runtime.mjs ai-context
          node scripts/playbook-runtime.mjs ai-contract
          node scripts/playbook-runtime.mjs context
          node scripts/playbook-runtime.mjs index
          node scripts/playbook-runtime.mjs verify
          node scripts/playbook-runtime.mjs plan
          node scripts/playbook-runtime.mjs pilot

      - name: Assert required runtime artifacts are written under .playbook/
        run: |
          required_artifacts=(
            ".playbook/findings.json"
            ".playbook/plan.json"
            ".playbook/repo-graph.json"
            ".playbook/last-run.json"
          )

          for artifact in "${required_artifacts[@]}"; do
            if [ ! -f "$artifact" ]; then
              echo "Expected required Playbook artifact '$artifact' to exist, but it was missing."
              exit 1
            fi
          done

          echo "All required Playbook artifacts are present under .playbook/."
