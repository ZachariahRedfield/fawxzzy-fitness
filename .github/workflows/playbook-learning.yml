name: Playbook Learning

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  playbook-learning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Threshold gate
        run: npm run playbook:threshold

      - name: Learning zone gate
        run: npm run playbook:check

      - name: Build PR playbook status summary
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git checkout "origin/${BASE_REF}"
          npm run --silent playbook:status:ci > base.json

          git checkout "${HEAD_SHA}"
          npm run --silent playbook:status:ci > head.json

          node <<'NODE' > summary.md
          const fs = require('node:fs');

          const base = JSON.parse(fs.readFileSync('base.json', 'utf8'));
          const head = JSON.parse(fs.readFileSync('head.json', 'utf8'));

          const keys = [
            ['drafts', 'Drafts (auto)'],
            ['proposed', 'Proposed'],
            ['promoted', 'Promoted'],
            ['upstreamed', 'Upstreamed'],
          ];

          const delta = (value) => (value > 0 ? `+${value}` : `${value}`);
          const proposedThreshold =
            head.proposed >= 20
              ? '❌ fail (>= 20)'
              : head.proposed >= 10
                ? '⚠️ warning (10-19)'
                : '✅ ok (< 10)';

          let md = '';
          md += '## Playbook Learning Status\n\n';
          md += '| Metric | Base | Head | Delta |\n';
          md += '| --- | ---: | ---: | ---: |\n';

          for (const [key, label] of keys) {
            const baseValue = Number(base[key] ?? 0);
            const headValue = Number(head[key] ?? 0);
            md += `| ${label} | ${baseValue} | ${headValue} | ${delta(headValue - baseValue)} |\n`;
          }

          md += `\n- Proposed threshold: **${proposedThreshold}**\n`;
          md += '- Suggested command: `npm run playbook:update`\n';

          process.stdout.write(md);
          NODE

          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update Playbook status PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- PLAYBOOK_STATUS -->';
            const summary = fs.readFileSync('summary.md', 'utf8').trim();
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Print Playbook revision (informational)
        if: always()
        run: node scripts/playbook/print-playbook-revision.mjs || true
