name: Playbook Learning

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  playbook-learning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Threshold gate
        run: npm run playbook:threshold

      - name: Learning zone gate
        run: npm run playbook:check

      - name: Run Playbook maintenance and emit status snapshot
        run: npm run playbook

      - name: Build PR playbook status summary
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          npm run --silent playbook:status:ci -- --format=markdown > summary.md
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playbook status artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-status
          path: docs/playbook-status.json

      - name: Upload Playbook trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-trend
          path: docs/playbook-trend.json

      - name: Update Playbook status PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- PLAYBOOK_STATUS -->';
            const summary = fs.readFileSync('summary.md', 'utf8').trim();
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Print Playbook revision (informational)
        if: always()
        run: node scripts/playbook/print-playbook-revision.mjs || true
