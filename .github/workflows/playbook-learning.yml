name: Playbook Learning

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  playbook-learning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Threshold gate
        run: npm run playbook:threshold

      - name: Learning zone gate
        run: npm run playbook:check

      - name: Run Playbook maintenance and emit status snapshot
        run: npm run playbook

      - name: Contracts gate
        run: node scripts/playbook/contracts-gate.mjs

      - name: Build PR playbook status summary (status-file driven)
        if: github.event_name == 'pull_request' && success()
        run: |
          set -euo pipefail
          npm run --silent playbook:status:ci -- --format=markdown > summary.md
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure Playbook status snapshot on failure
        if: failure()
        run: npm run playbook || true

      - name: Print Playbook next command (on failure)
        if: failure()
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/playbook-status.json';
          if (!fs.existsSync(path)) {
            console.log('No docs/playbook-status.json found.');
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync(path, 'utf8'));
          const next = status.recommended_next_action ?? status.next_command ?? status.nextCommand ?? null;
          const reason = status.reason ?? status.recommended_next_action_reason ?? status.next_reason ?? null;
          const counts = status.counts ?? status.knowledge_counts ?? status.knowledge ?? null;

          const lines = [];
          lines.push('## Playbook Next Command (from playbook-status.json)');
          if (next) lines.push(`**Next command:** \`${next}\``);
          if (reason) lines.push(`**Reason:** ${reason}`);
          if (counts) lines.push(`**Counts:** \`${JSON.stringify(counts)}\``);
          lines.push('');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          console.log(lines.join('\n'));
          NODE

      - name: Upload Playbook status artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-status
          path: docs/playbook-status.json

      - name: Upload Playbook trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-trend
          path: docs/playbook-trend.json

      - name: Update Playbook status PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            if (!fs.existsSync('summary.md')) {
              core.info('summary.md not found; skipping Playbook status PR comment update.');
              return;
            }

            const marker = '<!-- PLAYBOOK_STATUS -->';
            const summary = fs.readFileSync('summary.md', 'utf8').trim();
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Print Playbook revision (informational)
        if: always()
        run: node scripts/playbook/print-playbook-revision.mjs || true
